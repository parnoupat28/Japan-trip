<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คัมภีร์ลุยหิมะโทยามะ: นาโกย่า - โทยามะ</title>
    
    <!-- ขุมพลังรัน React/Tailwind บนบราวเซอร์ตรงๆ -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100">

    <div id="root"></div>

    <!-- สคริปต์เวทมนตร์แปลงร่างโมดูลจากไฟล์ app.js -->
    <script type="text/babel" data-plugins="transform-modules-umd" src="app.js"></script>

    <!-- สคริปต์สั่งเรนเดอร์ตัวแอปแยกส่วนป้องกันคนลบพัง -->
    <script type="text/babel">
        // รอให้ไฟล์ app.js โหลดเสร็จแล้วจับเรนเดอร์ทันที
        window.addEventListener('load', () => {
            const AppToRender = window.App || encodeReactApp;
            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(React.createElement(AppToRender));
        });

        function encodeReactApp() {
            return (
                <div class="p-8 text-center text-slate-400">
                    <p>⚠ กำลังโหลดแอปหรือไฟล์ app.js ของเทอยังว่างอยู่จ้า...</p>
                </div>
            );
        }
    </script>
</body>
</html>
