<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คัมภีร์ลุยหิมะโทยามะ: นาโกย่า - โทยามะ</title>
    
    <!-- โหลดขุมพลัง React, Tailwind, และ Babel เวอร์ชันอัปเกรด -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        async function launchApp() {
            try {
                // 1. วิ่งไปดึงโค้ดดิบจากไฟล์ App.tsx ที่เทอลากโยนลง Repo
                // เติมพารามิเตอร์กัน Caching ไฟล์เก่าหน้างานด้วยจ้า
                const response = await fetch('App.tsx?v=' + Date.now());
                if (!response.ok) throw new Error('ยังไม่มีไฟล์ App.tsx ใน Repo หรือหาไฟล์ไม่เจอจ้าเทอ');
                let code = await response.text();

                // 2. ✂️ [ท่าไม้ตายทลายบั๊ก] ล้างบางคำสั่งบิวด์ของ Canvas ออกให้หมด
                // แปลงคำว่า import ทุกอันในไฟล์ให้กลายเป็นคอมเมนต์ ( // ) บราวเซอร์จะได้มองข้ามแบบ 100%
                code = code.split('\n').map(line => {
                    const trimmed = line.trim();
                    if (trimmed.startsWith('import ') || trimmed.startsWith('import{') || trimmed.startsWith('import*')) {
                        return '// ' + line;
                    }
                    return line;
                }).join('\n');

                // ลบคำว่า export default ออกด้วยจ้า
                code = code.replace(/export\s+default\s+/g, '');

                // 3. ✨ แปลงร่างทั้ง TypeScript, sub-component และ React พร้อมกันหน้างาน
                const transformed = Babel.transform(code, { 
                    presets: ['react', 'typescript']
                }).code;

                // 4. สั่งรันโค้ดสดๆ 
                eval(transformed);
                
                // 5. พ่นคอนเทนต์แดชบอร์ดลุยหิมะลงจอแบบสมบูรณ์แบบ
                const root = ReactDOM.createRoot(document.getElementById('root'));
                root.render(React.createElement(App));
                
            } catch (error) {
                console.error("เลขาตรวจเจอจุดบั๊ก:", error);
                document.getElementById('root').innerHTML = `
                    <div class="p-8 text-center text-rose-400">
                        <p class="font-bold">⚠ เกิดข้อผิดพลาดในการรันไฟล์ .tsx จ้าเทอ</p>
                        <p class="text-xs text-slate-500 mt-2">${error.message}</p>
                        <p class="text-[11px] text-cyan-500 mt-4">💡 วิธีแก้: ลองกดปุ่มลากไฟล์ App.tsx โยนทับลง Repo อีกรอบน้า</p>
                    </div>
                `;
            }
        }

        launchApp();
    </script>
</body>
</html>
