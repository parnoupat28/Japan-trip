<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คัมภีร์ลุยหิมะโทยามะ: นาโกย่า - โทยามะ</title>
    
    <!-- โหลดขุมพลัง React/Tailwind/Babel บนบราวเซอร์ตรงๆ -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- ปลั๊กอินพิเศษดักลบคำว่า import/export อัตโนมัติหน้างาน -->
    <script>
      Babel.registerPlugin('fake-modules', function(babel) {
        return {
          visitor: {
            ImportDeclaration(path) { path.remove(); },
            ExportDefaultDeclaration(path) {
              if (path.node.declaration.type === 'FunctionDeclaration') {
                path.replaceWith(path.node.declaration);
              }
            }
          }
        };
      });
    </script>
</head>
<body class="bg-slate-900 text-slate-100">

    <div id="root"></div>

    <!-- รันไฟล์ app.js ผ่านปลั๊กอินพิเศษรื้อถอนคำสั่งบิวด์ -->
    <script type="text/babel" data-plugins="fake-modules" src="app.js"></script>

    <!-- สั่งเรนเดอร์เงียบๆ อยู่เบื้องหลัง -->
    <script type="text/babel">
        window.addEventListener('load', () => {
            setTimeout(() => {
                const { useState, useEffect } = React;
                const root = ReactDOM.createRoot(document.getElementById('root'));
                root.render(React.createElement(App));
            }, 200);
        });
    </script>
</body>
</html>
